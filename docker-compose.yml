services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: chatbot
      POSTGRES_PASSWORD: chatbot
      POSTGRES_DB: chatbot
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatbot -d chatbot"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://chatbot:chatbot@db:5432/chatbot
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    stdin_open: true
    tty: true

volumes:
  pgdata:
